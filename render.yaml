services:
  - type: web
    name: travel-companion-api
    runtime: python
    pythonVersion: 3.11
    plan: free
    
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    
    startCommand: gunicorn travel_companion.wsgi:application --log-file -
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    
    # Environment variables from dashboard:
    # SECRET_KEY
    # DEBUG=False
    # ALLOWED_HOSTS
    # DB_NAME
    # DB_USER
    # DB_PASSWORD
    # DB_HOST
    # DB_PORT
    # CORS_ALLOWED_ORIGINS
    # EMAIL_HOST_USER
    # EMAIL_HOST_PASSWORD
    # DEFAULT_FROM_EMAIL
